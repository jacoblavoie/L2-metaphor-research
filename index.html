<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metaphor Recognition Study</title>

  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />

  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@2.1.0"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css">

  <style>
    body {
      background: #fafafa;
      font-family: Arial, Helvetica, sans-serif;
    }
    .study-wrap {
      max-width: 920px;
      margin: 0 auto;
      line-height: 1.65;
      font-size: 18px;
    }
    .instruction-box,
    .passage-box,
    .underline-target {
      border: 1px solid #ddd;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      text-align: left;
    }
    .passage-box,
    .underline-target {
      white-space: pre-wrap;
    }
    .trial-header {
      margin-bottom: 14px;
      font-size: 15px;
      color: #666;
    }
    .language-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef3ff;
      color: #335;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .meta-tools {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0;
      justify-content: center;
    }
    .meta-tools button {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #bbb;
      background: white;
      cursor: pointer;
    }
    .meta-tools button:hover {
      background: #f2f2f2;
    }
    .underlined {
      text-decoration: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 3px;
      background: rgba(255, 235, 59, 0.22);
    }
    .small-note {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
  <noscript>This study requires JavaScript to run.</noscript>

  <!-- Stimulus files -->
  <script src="stimuli/hv1.js"></script>
  <script src="stimuli/hv2.js"></script>
  <script src="stimuli/lv1.js"></script>
  <script src="stimuli/lv2.js"></script>

  <!-- Main experiment logic -->
  <script src="experiment.js"></script>
</body>
</html>
